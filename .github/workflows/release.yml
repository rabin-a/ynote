name: release

# Push a version tag (e.g. v0.1.0) to build ynote for macOS, Linux, and
# Windows and attach the installers to a GitHub Release for that tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-latest
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux webview deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libssl-dev build-essential

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/app
          tagName: ${{ github.ref_name }}
          releaseName: "ynote ${{ github.ref_name }}"
          releaseBody: |
            ynote — a project-based markdown editor, previewer, and exporter.

            **Install (macOS / Linux):**
            ```
            curl -fsSL https://raw.githubusercontent.com/rabin-a/ynote/main/install.sh | bash
            ```

            Downloads below: macOS universal `.dmg`, Linux `.AppImage`/`.deb`, Windows `.msi`.
            The macOS and Windows builds aren't code-signed/notarized yet — the install
            script clears the macOS quarantine for you.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Also ship the standalone CLI (`ynote`) and MCP server (`ynote-mcp`)
      # so `install.sh cli|mcp|all` can fetch prebuilt binaries.
      - name: Package CLI + MCP (macOS universal)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo build --release -p ynote-cli -p ynote-mcp --target aarch64-apple-darwin
          cargo build --release -p ynote-cli -p ynote-mcp --target x86_64-apple-darwin
          mkdir -p dist
          lipo -create target/aarch64-apple-darwin/release/ynote     target/x86_64-apple-darwin/release/ynote     -output dist/ynote
          lipo -create target/aarch64-apple-darwin/release/ynote-mcp target/x86_64-apple-darwin/release/ynote-mcp -output dist/ynote-mcp
          tar -czf ynote-tools-macos-universal.tar.gz -C dist ynote ynote-mcp
          gh release upload "${{ github.ref_name }}" ynote-tools-macos-universal.tar.gz --clobber

      - name: Package CLI + MCP (Linux)
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo build --release -p ynote-cli -p ynote-mcp
          tar -czf ynote-tools-linux-x86_64.tar.gz -C target/release ynote ynote-mcp
          gh release upload "${{ github.ref_name }}" ynote-tools-linux-x86_64.tar.gz --clobber

      - name: Package CLI + MCP (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo build --release -p ynote-cli -p ynote-mcp
          Compress-Archive -Path target/release/ynote.exe,target/release/ynote-mcp.exe -DestinationPath ynote-tools-windows-x86_64.zip -Force
          gh release upload "${{ github.ref_name }}" ynote-tools-windows-x86_64.zip --clobber
